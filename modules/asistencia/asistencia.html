<div class="section-header">
  <h2>Pase de Lista</h2>
  <p id="asistFecha">—</p>
</div>

<!-- Tabs -->
<div class="asist-mode-tabs">
  <button class="asist-mode-tab active" onclick="showAsistPanel('panel-scanner')">
    📷 Reconocimiento Facial
  </button>
  <button class="asist-mode-tab" onclick="showAsistPanel('panel-manual')">
    🔍 Búsqueda Manual
  </button>
  <button class="asist-mode-tab" onclick="showAsistPanel('panel-stats')">
    📊 Estadísticas
  </button>
</div>

<div class="asist-layout">

  <!-- IZQUIERDA -->
  <div class="asist-left">

    <!-- SCANNER -->
    <div class="asist-panel active" id="panel-scanner">
      <div class="asist-camera-wrap">
        <div class="asist-camera-frame">
          <video id="asistVideo" autoplay muted playsinline></video>
          <canvas id="asistCanvas"></canvas>

          <div class="asist-result-overlay" id="asistResultOverlay">
            <div class="asist-result-icon" id="asistResultIcon">✓</div>
            <div class="asist-result-name" id="asistResultName">—</div>
            <div class="asist-result-msg" id="asistResultMsg">—</div>
          </div>
        </div>

        <div id="asistStatus" class="asist-status info">
          Iniciando cámara...
        </div>
      </div>
    </div>

    <!-- BÚSQUEDA MANUAL -->
    <div class="asist-panel" id="panel-manual">
      <div class="asist-search-wrap">
        <p class="asist-search-hint">
          Usa esta opción si el reconocimiento facial no funciona correctamente.
        </p>

        <div class="asist-search-row">
          <div class="form-group" style="flex:1;margin:0;">
            <label>Buscar por nombre</label>
            <input type="text" id="asistBusqueda"
                   placeholder="Escribe el nombre..."
                   onkeyup="if(event.key==='Enter') buscarMiembroManual()" />
          </div>
          <button class="btn-primary"
                  onclick="buscarMiembroManual()">
            Buscar
          </button>
        </div>

        <div id="asistBusquedaResultados"
             class="asist-search-results"></div>
      </div>
    </div>

    <!-- ESTADÍSTICAS -->
    <div class="asist-panel" id="panel-stats">
      <div class="asist-stats-wrap">
        <div class="asist-stats-header">
          <span class="asist-stats-title"
                id="asistEjercicioNombre">—</span>
          <span class="asist-stats-count"
                id="asistStatsCount"></span>
        </div>

        <div id="asistStatslist"
             class="asist-stats-list">
          <div class="asist-empty">Cargando...</div>
        </div>
      </div>
    </div>

  </div>

  <!-- DERECHA -->
  <div class="asist-right">
    <div class="asist-today-card">
      <div class="asist-today-header">
        <span class="asist-today-title">
          Asistencia Hoy
        </span>
        <span class="asist-today-count"
              id="asistTodayCount">0</span>
      </div>

      <ul class="asist-today-list"
          id="asistTodayList">
        <li class="asist-empty">
          Sin registros aún
        </li>
      </ul>
    </div>
  </div>

</div>
